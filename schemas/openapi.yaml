openapi: 3.1.0
info:
  title: CloudTime API
  description: |
    Self-hosted WakaTime-compatible coding time tracker API.
    Compatible with WakaTime editor plugins and CLI tools.
  version: 0.1.0
  license:
    name: MIT
servers:
  - url: /api/v1
    description: API v1
security:
  - apiKey: []
  - bearerAuth: []
  - apiKeyQuery: []
  - sessionCookie: []
tags:
  - name: auth
    description: OAuth authentication and session management
  - name: heartbeats
    description: Coding activity heartbeats sent from editor plugins
  - name: summaries
    description: Aggregated daily coding activity summaries
  - name: stats
    description: Coding statistics over time ranges
  - name: durations
    description: Heartbeats joined into continuous coding durations
  - name: users
    description: User profile and account information
  - name: projects
    description: Detected coding projects
  - name: status_bar
    description: Today's coding activity for IDE status bars
  - name: all_time
    description: Total coding time since account creation
  - name: goals
    description: Programming goals and targets
  - name: leaderboards
    description: Public and private coding leaderboards
  - name: insights
    description: Coding activity insights and analytics
  - name: custom_rules
    description: Rules for remapping projects, languages, etc.
  - name: machine_names
    description: Machine/device tracking
  - name: user_agents
    description: Editor plugin tracking
  - name: data_dumps
    description: Data export
  - name: external_durations
    description: External time entries (calendar integrations)
  - name: commits
    description: Git commit time tracking
  - name: orgs
    description: Organization and team management
  - name: meta
    description: Server metadata (public)
paths:
  /auth/{provider}:
    $ref: paths/auth_{provider}.yaml
  /auth/{provider}/callback:
    $ref: paths/auth_{provider}_callback.yaml
  /auth/link/{provider}:
    $ref: paths/auth_link_{provider}.yaml
  /auth/link/{provider}/callback:
    $ref: paths/auth_link_{provider}_callback.yaml
  /auth/link/approve/{pending_link_id}:
    $ref: paths/auth_link_approve_{pending_link_id}.yaml
  /auth/providers:
    $ref: paths/auth_providers.yaml
  /auth/providers/{provider}:
    $ref: paths/auth_providers_{provider}.yaml
  /auth/session:
    $ref: paths/auth_session.yaml
  /auth/api-key:
    $ref: paths/auth_api-key.yaml
  /users/current/profile:
    $ref: paths/users_current_profile.yaml
  /health:
    $ref: paths/health.yaml
  /users/current:
    $ref: paths/users_current.yaml
  /users/current/heartbeats:
    $ref: paths/users_current_heartbeats.yaml
  /users/current/heartbeats.bulk:
    $ref: paths/users_current_heartbeats.bulk.yaml
  /users/current/status_bar/today:
    $ref: paths/users_current_status_bar_today.yaml
  /users/current/summaries:
    $ref: paths/users_current_summaries.yaml
  /users/current/durations:
    $ref: paths/users_current_durations.yaml
  /users/current/stats/{range}:
    $ref: paths/users_current_stats_{range}.yaml
  /users/current/all_time_since_today:
    $ref: paths/users_current_all_time_since_today.yaml
  /users/current/projects:
    $ref: paths/users_current_projects.yaml
  /users/current/goals:
    $ref: paths/users_current_goals.yaml
  /users/current/goals/{goal_id}:
    $ref: paths/users_current_goals_{goal_id}.yaml
  /leaders:
    $ref: paths/leaders.yaml
  /users/current/leaderboards:
    $ref: paths/users_current_leaderboards.yaml
  /users/current/leaderboards/{board_id}:
    $ref: paths/users_current_leaderboards_{board_id}.yaml
  /users/current/insights/{insight_type}/{range}:
    $ref: paths/users_current_insights_{insight_type}_{range}.yaml
  /users/current/custom_rules:
    $ref: paths/users_current_custom_rules.yaml
  /users/current/custom_rules/{rule_id}:
    $ref: paths/users_current_custom_rules_{rule_id}.yaml
  /users/current/machine_names:
    $ref: paths/users_current_machine_names.yaml
  /users/current/user_agents:
    $ref: paths/users_current_user_agents.yaml
  /users/current/data_dumps:
    $ref: paths/users_current_data_dumps.yaml
  /users/current/external_durations:
    $ref: paths/users_current_external_durations.yaml
  /users/current/external_durations.bulk:
    $ref: paths/users_current_external_durations.bulk.yaml
  /users/current/projects/{project}/commits:
    $ref: paths/users_current_projects_{project}_commits.yaml
  /users/current/projects/{project}/commits/{hash}:
    $ref: paths/users_current_projects_{project}_commits_{hash}.yaml
  /users/current/orgs:
    $ref: paths/users_current_orgs.yaml
  /users/current/orgs/{org_id}/dashboards:
    $ref: paths/users_current_orgs_{org_id}_dashboards.yaml
  /users/current/orgs/{org_id}/dashboards/{dashboard_id}/members:
    $ref: paths/users_current_orgs_{org_id}_dashboards_{dashboard_id}_members.yaml
  /users/current/orgs/{org_id}/dashboards/{dashboard_id}/summaries:
    $ref: paths/users_current_orgs_{org_id}_dashboards_{dashboard_id}_summaries.yaml
  /editors:
    $ref: paths/editors.yaml
  /program_languages:
    $ref: paths/program_languages.yaml
  /meta:
    $ref: paths/meta.yaml
  /stats/{range}:
    $ref: paths/stats_{range}.yaml
components:
  securitySchemes:
    apiKey:
      type: http
      scheme: basic
      description: API key as username with empty password (base64 of "apikey:")
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key as query parameter (?api_key=your_key)
    sessionCookie:
      type: apiKey
      in: cookie
      name: __session
      description: |
        HttpOnly session cookie for web UI.
        Secure, SameSite=Strict, 24h TTL (sliding).
        Random 32-byte token; stored as SHA-256 hash in DB.
