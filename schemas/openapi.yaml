components:
  # ============================================================
  # Security Schemes
  # ============================================================
  securitySchemes:
    apiKey:
      type: http
      scheme: basic
      description: API key as username with empty password (base64 of "apikey:")

    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

    sessionCookie:
      type: apiKey
      in: cookie
      name: __session
      description: |
        Encrypted session cookie for web UI.
        HttpOnly, Secure, SameSite=Strict, 24h TTL.
        Token stored as SHA-256 hash in DB, never in plaintext.

  # ============================================================
  # Reusable Responses
  # ============================================================
  responses:
    Unauthorized:
      description: Authentication required or invalid credentials
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Unauthorized

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Not found

  # ============================================================
  # Schemas
  # ============================================================
  schemas:
    # ----------------------------------------------------------
    # User
    # ----------------------------------------------------------
    User:
      type: object
      required: [id, username, created_at]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
          format: email
        photo:
          type: string
          format: uri
        bio:
          type: string
        city:
          type: string
        timezone:
          type: string
        last_heartbeat_at:
          type: string
          format: date-time
        last_project:
          type: string
        plan:
          type: string
          enum: [free, basic, premium]
        is_hireable:
          type: boolean
        github_username:
          type: string
        twitter_username:
          type: string
        website:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time

    # ----------------------------------------------------------
    # Heartbeat
    # ----------------------------------------------------------
    HeartbeatInput:
      type: object
      required: [entity, type, time]
      properties:
        entity:
          type: string
          description: File path, app name, or domain
        type:
          type: string
          enum: [file, app, domain]
        time:
          type: number
          format: double
          description: UNIX epoch timestamp
        category:
          $ref: "#/components/schemas/Category"
        project:
          type: string
        project_root_count:
          type: integer
        branch:
          type: string
        language:
          type: string
        dependencies:
          type: string
          description: Comma-separated dependency names
        lines:
          type: integer
        ai_line_changes:
          type: integer
        human_line_changes:
          type: integer
        lineno:
          type: integer
        cursorpos:
          type: integer
        is_write:
          type: boolean

    Heartbeat:
      allOf:
        - $ref: "#/components/schemas/HeartbeatInput"
        - type: object
          required: [id, user_id, created_at]
          properties:
            id:
              type: string
            user_id:
              type: string
            machine:
              type: string
            user_agent_id:
              type: string
            created_at:
              type: string
              format: date-time

    Category:
      type: string
      enum:
        - coding
        - building
        - indexing
        - debugging
        - browsing
        - running tests
        - writing tests
        - manual testing
        - writing docs
        - communicating
        - code reviewing
        - notes
        - researching
        - learning
        - designing
        - ai coding

    # ----------------------------------------------------------
    # Summary
    # ----------------------------------------------------------
    Summary:
      type: object
      required: [grand_total, range]
      properties:
        grand_total:
          $ref: "#/components/schemas/GrandTotal"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        languages:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        editors:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        operating_systems:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        machines:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        branches:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        entities:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        range:
          $ref: "#/components/schemas/TimeRange"

    SummaryItem:
      type: object
      required: [name, total_seconds, percent, digital, text]
      properties:
        name:
          type: string
        total_seconds:
          type: number
          format: double
        percent:
          type: number
          format: double
        digital:
          type: string
          description: "Digital clock format (H:MM)"
        text:
          type: string
          description: "Human readable (e.g., '2 hrs 30 mins')"
        hours:
          type: integer
        minutes:
          type: integer
        seconds:
          type: integer

    GrandTotal:
      type: object
      required: [total_seconds, digital, text]
      properties:
        total_seconds:
          type: number
          format: double
        digital:
          type: string
        text:
          type: string
        hours:
          type: integer
        minutes:
          type: integer

    CumulativeTotal:
      type: object
      properties:
        seconds:
          type: number
          format: double
        text:
          type: string
        digital:
          type: string

    DailyAverage:
      type: object
      properties:
        seconds:
          type: number
          format: double
        text:
          type: string

    SummaryRange:
      type: string
      enum:
        - Today
        - Yesterday
        - Last 7 Days
        - Last 7 Days from Yesterday
        - Last 14 Days
        - Last 30 Days
        - This Week
        - Last Week
        - This Month
        - Last Month

    # ----------------------------------------------------------
    # Duration
    # ----------------------------------------------------------
    Duration:
      type: object
      required: [project, time, duration]
      properties:
        project:
          type: string
        time:
          type: number
          format: double
          description: Start time as UNIX epoch
        duration:
          type: number
          format: double
          description: Duration in seconds
        color:
          type: string
        entity:
          type: string
        language:
          type: string
        branch:
          type: string
        category:
          $ref: "#/components/schemas/Category"
        machine:
          type: string

    # ----------------------------------------------------------
    # Stats
    # ----------------------------------------------------------
    Stats:
      type: object
      properties:
        total_seconds:
          type: number
          format: double
        total_seconds_including_other_language:
          type: number
          format: double
        daily_average:
          type: number
          format: double
        daily_average_including_other_language:
          type: number
          format: double
        human_readable_total:
          type: string
        human_readable_total_including_other_language:
          type: string
        human_readable_daily_average:
          type: string
        human_readable_daily_average_including_other_language:
          type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        languages:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        editors:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        operating_systems:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        dependencies:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        machines:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        best_day:
          type: object
          properties:
            date:
              type: string
              format: date
            total_seconds:
              type: number
              format: double
            text:
              type: string
        range:
          $ref: "#/components/schemas/TimeRange"
        status:
          type: string
          enum: [ok, pending_update]
        is_already_updating:
          type: boolean
        is_up_to_date:
          type: boolean

    # ----------------------------------------------------------
    # Global Stats (public aggregate, no per-user fields)
    # ----------------------------------------------------------
    GlobalStats:
      type: object
      properties:
        total_seconds:
          type: number
          format: double
        total_seconds_including_other_language:
          type: number
          format: double
        daily_average:
          type: number
          format: double
        human_readable_total:
          type: string
        human_readable_daily_average:
          type: string
        categories:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        languages:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        editors:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        operating_systems:
          type: array
          items:
            $ref: "#/components/schemas/SummaryItem"
        range:
          $ref: "#/components/schemas/TimeRange"

    # ----------------------------------------------------------
    # All Time
    # ----------------------------------------------------------
    AllTime:
      type: object
      required: [total_seconds, text, digital, is_up_to_date]
      properties:
        total_seconds:
          type: number
          format: double
        text:
          type: string
          description: "Human readable (e.g., '1,250 hrs 30 mins')"
        digital:
          type: string
        is_up_to_date:
          type: boolean
        range:
          $ref: "#/components/schemas/TimeRange"
        project:
          type: string

    # ----------------------------------------------------------
    # Project
    # ----------------------------------------------------------
    Project:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        repository:
          type: string
          format: uri
        badge:
          type: string
          format: uri
        color:
          type: string
        has_public_url:
          type: boolean
        human_readable_last_heartbeat_at:
          type: string
        last_heartbeat_at:
          type: string
          format: date-time
        first_heartbeat_at:
          type: string
          format: date-time
        url:
          type: string
          format: uri
        created_at:
          type: string
          format: date-time

    # ----------------------------------------------------------
    # Goal
    # ----------------------------------------------------------
    Goal:
      type: object
      required: [id, title, created_at]
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [coding, languages, editors, projects]
        delta:
          type: string
          enum: [day, week]
        target_seconds:
          type: number
          format: double
        is_enabled:
          type: boolean
        is_snoozed:
          type: boolean
        is_inverse:
          type: boolean
        languages:
          type: array
          items:
            type: string
        editors:
          type: array
          items:
            type: string
        projects:
          type: array
          items:
            type: string
        chart_data:
          type: array
          items:
            type: object
            properties:
              actual_seconds:
                type: number
                format: double
              goal_seconds:
                type: number
                format: double
              range:
                $ref: "#/components/schemas/TimeRange"
              range_status:
                type: string
                enum: [success, fail, pending]
        status:
          type: string
          enum: [success, fail, pending]
        created_at:
          type: string
          format: date-time
        modified_at:
          type: string
          format: date-time

    # ----------------------------------------------------------
    # Leaderboard
    # ----------------------------------------------------------
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        user:
          type: object
          properties:
            id:
              type: string
            display_name:
              type: string
            username:
              type: string
            photo:
              type: string
              format: uri
            is_hireable:
              type: boolean
            city:
              type: string
            country_code:
              type: string
        running_total:
          type: object
          properties:
            total_seconds:
              type: number
              format: double
            human_readable_total:
              type: string
            daily_average:
              type: number
              format: double
            human_readable_daily_average:
              type: string
            languages:
              type: array
              items:
                type: object
                properties:
                  name:
