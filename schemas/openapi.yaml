openapi: 3.1.0
info:
  title: CloudTime API
  description: |
    Self-hosted WakaTime-compatible coding time tracker API.
    Compatible with WakaTime editor plugins and CLI tools.
  version: 0.1.0
  license:
    name: MIT

servers:
  - url: /api/v1
    description: API v1

security:
  - apiKey: []
  - bearerAuth: []

tags:
  - name: auth
    description: OAuth authentication and session management
  - name: heartbeats
    description: Coding activity heartbeats sent from editor plugins
  - name: summaries
    description: Aggregated daily coding activity summaries
  - name: stats
    description: Coding statistics over time ranges
  - name: durations
    description: Heartbeats joined into continuous coding durations
  - name: users
    description: User profile and account information
  - name: projects
    description: Detected coding projects
  - name: status_bar
    description: Today's coding activity for IDE status bars
  - name: all_time
    description: Total coding time since account creation
  - name: goals
    description: Programming goals and targets
  - name: leaderboards
    description: Public and private coding leaderboards
  - name: insights
    description: Coding activity insights and analytics
  - name: custom_rules
    description: Rules for remapping projects, languages, etc.
  - name: machine_names
    description: Machine/device tracking
  - name: user_agents
    description: Editor plugin tracking
  - name: data_dumps
    description: Data export
  - name: external_durations
    description: External time entries (calendar integrations)
  - name: commits
    description: Git commit time tracking
  - name: orgs
    description: Organization and team management
  - name: meta
    description: Server metadata (public)

paths:
  # ============================================================
  # Authentication (OAuth)
  # ============================================================
  /auth/{provider}:
    get:
      operationId: oauthRedirect
      tags: [auth]
      summary: Initiate OAuth flow with a provider
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
      responses:
        "302":
          description: Redirect to OAuth provider
          headers:
            Location:
              schema:
                type: string
                format: uri
            Set-Cookie:
              description: PKCE code_verifier stored in encrypted cookie
              schema:
                type: string

  /auth/{provider}/callback:
    get:
      operationId: oauthCallback
      tags: [auth]
      summary: OAuth callback - creates or authenticates user
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authentication successful
          headers:
            Set-Cookie:
              description: Session cookie (HttpOnly, Secure, SameSite=Strict)
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [user, api_key]
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      api_key:
                        type: string
                        description: "API key for editor plugins (ck_...)"
                      is_new_user:
                        type: boolean
                      pending_link:
                        $ref: "#/components/schemas/PendingLink"
        "400":
          description: Invalid OAuth callback (bad code/state)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /auth/link/{provider}:
    post:
      operationId: oauthLinkStart
      tags: [auth]
      summary: Link additional OAuth provider to current account
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
      responses:
        "302":
          description: Redirect to OAuth provider for linking
          headers:
            Location:
              schema:
                type: string
                format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/link/{provider}/callback:
    get:
      operationId: oauthLinkCallback
      tags: [auth]
      summary: OAuth link callback - links provider to current account
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider linked successfully
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [provider, provider_username]
                    properties:
                      provider:
                        $ref: "#/components/schemas/OAuthProvider"
                      provider_username:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Provider account already linked to another user
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /auth/link/approve/{pending_link_id}:
    post:
      operationId: approvePendingLink
      tags: [auth]
      summary: Approve merging an OAuth account into existing user
      parameters:
        - name: pending_link_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accounts merged
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [user, api_key]
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      api_key:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          description: Pending link expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /auth/providers:
    get:
      operationId: getLinkedProviders
      tags: [auth]
      summary: List OAuth providers linked to current account
      responses:
        "200":
          description: List of linked providers
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LinkedProvider"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/providers/{provider}:
    delete:
      operationId: unlinkProvider
      tags: [auth]
      summary: Unlink an OAuth provider from current account
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/OAuthProvider"
      responses:
        "204":
          description: Provider unlinked
        "400":
          description: Cannot unlink last provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/session:
    get:
      operationId: getSession
      tags: [auth]
      summary: Get current session info
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [user]
                    properties:
                      user:
                        $ref: "#/components/schemas/User"
                      providers:
                        type: array
                        items:
                          $ref: "#/components/schemas/LinkedProvider"
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      operationId: logout
      tags: [auth]
      summary: Logout - invalidate current session
      responses:
        "204":
          description: Session invalidated
          headers:
            Set-Cookie:
              description: Clear session cookie
              schema:
                type: string

  /auth/api-key:
    post:
      operationId: regenerateApiKey
      tags: [auth]
      summary: Regenerate API key
      responses:
        "200":
          description: New API key generated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [api_key]
                    properties:
                      api_key:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Users (add profile update)
  # ============================================================
  /users/current/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update current user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                display_name:
                  type: string
                bio:
                  type: string
                city:
                  type: string
                timezone:
                  type: string
                timeout:
                  type: integer
                  minimum: 1
                  maximum: 60
                is_hireable:
                  type: boolean
                github_username:
                  type: string
                twitter_username:
                  type: string
                website:
                  type: string
                  format: uri
                photo:
                  type: string
                  format: uri
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  # ============================================================
  # Health Check
  # ============================================================
  /health:
    get:
      operationId: getHealth
      tags: [meta]
      summary: Health check
      security: []
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    const: ok

  # ============================================================
  # Users
  # ============================================================
  /users/current:
    get:
      operationId: getCurrentUser
      tags: [users]
      summary: Get current user's profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Heartbeats
  # ============================================================
  /users/current/heartbeats:
    get:
      operationId: getHeartbeats
      tags: [heartbeats]
      summary: List heartbeats for a given day
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
            example: "2026-03-09"
      responses:
        "200":
          description: List of heartbeats
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Heartbeat"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createHeartbeat
      tags: [heartbeats]
      summary: Create a single heartbeat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatInput"
      responses:
        "201":
          description: Heartbeat created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Heartbeat"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/current/heartbeats.bulk:
    post:
      operationId: createHeartbeatsBulk
      tags: [heartbeats]
      summary: Create up to 25 heartbeats at once
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/HeartbeatInput"
              maxItems: 25
      responses:
        "202":
          description: Heartbeats accepted
          content:
            application/json:
              schema:
                type: object
                required: [responses]
                properties:
                  responses:
                    type: array
                    items:
                      type: array
                      prefixItems:
                        - $ref: "#/components/schemas/Heartbeat"
                        - type: integer
                          description: HTTP status code
        "401":
          $ref: "#/components/responses/Unauthorized"

    delete:
      operationId: deleteHeartbeatsBulk
      tags: [heartbeats]
      summary: Delete heartbeats
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, ids]
              properties:
                date:
                  type: string
                  format: date
                ids:
                  type: array
                  items:
                    type: string
      responses:
        "204":
          description: Heartbeats deleted
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Status Bar
  # ============================================================
  /users/current/status_bar/today:
    get:
      operationId: getStatusBarToday
      tags: [status_bar]
      summary: Today's coding activity for IDE status bars
      description: Cached version of summaries for today. Returns empty summary while cache updates.
      responses:
        "200":
          description: Today's status bar data
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Summary"
                  cached_at:
                    type: string
                    format: date-time
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Summaries
  # ============================================================
  /users/current/summaries:
    get:
      operationId: getSummaries
      tags: [summaries]
      summary: Coding activity summaries for a date range
      parameters:
        - name: start
          in: query
          schema:
            type: string
            format: date
        - name: end
          in: query
          schema:
            type: string
            format: date
        - name: range
          in: query
          description: Predefined range (alternative to start/end)
          schema:
            $ref: "#/components/schemas/SummaryRange"
        - name: project
          in: query
          schema:
            type: string
        - name: branches
          in: query
          description: Comma-separated branch names
          schema:
            type: string
        - name: timeout
          in: query
          description: Keystroke timeout in minutes
          schema:
            type: integer
        - name: writes_only
          in: query
          schema:
            type: boolean
        - name: timezone
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Daily summaries
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Summary"
                  start:
                    type: string
                    format: date
                  end:
                    type: string
                    format: date
                  cumulative_total:
                    $ref: "#/components/schemas/CumulativeTotal"
                  daily_average:
                    $ref: "#/components/schemas/DailyAverage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Durations
  # ============================================================
  /users/current/durations:
    get:
      operationId: getDurations
      tags: [durations]
      summary: Coding durations for a day (heartbeats joined by timeout)
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: project
          in: query
          schema:
            type: string
        - name: branches
          in: query
          schema:
            type: string
        - name: timeout
          in: query
          schema:
            type: integer
        - name: writes_only
          in: query
          schema:
            type: boolean
        - name: timezone
          in: query
          schema:
            type: string
        - name: slice_by
          in: query
          schema:
            type: string
            enum: [project, entity, language, dependencies, operating_system, editor, category, machine]
      responses:
        "200":
          description: List of durations
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Duration"
                  branches:
                    type: array
                    items:
                      type: string
                  start:
                    type: string
                    format: date
                  end:
                    type: string
                    format: date
                  timezone:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Stats
  # ============================================================
  /users/current/stats/{range}:
    get:
      operationId: getStats
      tags: [stats]
      summary: Coding statistics for a time range
      parameters:
        - name: range
          in: path
          required: true
          schema:
            type: string
            description: "last_7_days, last_30_days, last_6_months, last_year, all_time, or YYYY / YYYY-MM"
        - name: timeout
          in: query
          schema:
            type: integer
        - name: writes_only
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Stats"
        "202":
          description: Stats are still being calculated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Stats"
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # All Time Since Today
  # ============================================================
  /users/current/all_time_since_today:
    get:
      operationId: getAllTimeSinceToday
      tags: [all_time]
      summary: Total coding time since account creation
      parameters:
        - name: project
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All time data
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AllTime"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Projects
  # ============================================================
  /users/current/projects:
    get:
      operationId: getProjects
      tags: [projects]
      summary: List user's projects
      parameters:
        - name: q
          in: query
          description: Search term
          schema:
            type: string
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Goals
  # ============================================================
  /users/current/goals:
    get:
      operationId: getGoals
      tags: [goals]
      summary: List user's goals
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Goal"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/current/goals/{goal_id}:
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get a single goal with chart data
      parameters:
        - name: goal_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Goal with chart data
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Goal"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ============================================================
  # Leaderboards
  # ============================================================
  /leaders:
    get:
      operationId: getPublicLeaders
      tags: [leaderboards]
      summary: Public leaderboard ranked by coding activity
      security: []
      parameters:
        - name: language
          in: query
          schema:
            type: string
        - name: is_hireable
          in: query
          schema:
            type: boolean
        - name: country_code
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard rankings
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  current_user:
                    $ref: "#/components/schemas/LeaderboardEntry"
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"
                  page:
                    type: integer
                  total_pages:
                    type: integer
                  range:
                    $ref: "#/components/schemas/TimeRange"
                  language:
                    type: string
                  modified_at:
                    type: string
                    format: date-time

  /users/current/leaderboards:
    get:
      operationId: getPrivateLeaderboards
      tags: [leaderboards]
      summary: User's private leaderboards
      responses:
        "200":
          description: List of private leaderboards
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PrivateLeaderboard"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/current/leaderboards/{board_id}:
    get:
      operationId: getPrivateLeaderboard
      tags: [leaderboards]
      summary: Rankings in a specific private leaderboard
      parameters:
        - name: board_id
          in: path
          required: true
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
        - name: country_code
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard rankings
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/LeaderboardEntry"
                  page:
                    type: integer
                  total_pages:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Insights
  # ============================================================
  /users/current/insights/{insight_type}/{range}:
    get:
      operationId: getInsight
      tags: [insights]
      summary: Coding activity insights
      parameters:
        - name: insight_type
          in: path
          required: true
          schema:
            type: string
            enum: [weekday, days, best_day, daily_average, projects, languages, editors, categories, machines, operating_systems]
        - name: range
          in: path
          required: true
          schema:
            type: string
            description: "last_7_days, last_30_days, last_6_months, last_year, all_time, or YYYY / YYYY-MM"
        - name: timeout
          in: query
          schema:
            type: integer
        - name: writes_only
          in: query
          schema:
            type: boolean
        - name: weekday
          in: query
          description: Filter for 'days' insight type (0-6 or monday-sunday)
          schema:
            type: string
      responses:
        "200":
          description: Insight data
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Insight"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ============================================================
  # Custom Rules
  # ============================================================
  /users/current/custom_rules:
    get:
      operationId: getCustomRules
      tags: [custom_rules]
      summary: List user's custom rules
      responses:
        "200":
          description: List of custom rules
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CustomRule"
        "401":
          $ref: "#/components/responses/Unauthorized"

    put:
      operationId: updateCustomRules
      tags: [custom_rules]
      summary: Replace user's custom rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomRuleInput"
      responses:
        "200":
          description: Updated rules
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
