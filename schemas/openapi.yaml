openapi: 3.1.0
info:
  title: CloudTime API
  description: |
    Self-hosted WakaTime-compatible coding time tracker API.
    Compatible with WakaTime editor plugins and CLI tools.
  version: 0.1.0
  license:
    name: MIT
servers:
  - url: /api/v1
    description: API v1
security:
  - apiKey: []
  - bearerAuth: []
  - apiKeyQuery: []
  - sessionCookie: []
tags:
  - name: auth
    description: OAuth authentication and session management
  - name: heartbeats
    description: Coding activity heartbeats sent from editor plugins
  - name: summaries
    description: Aggregated daily coding activity summaries
  - name: stats
    description: Coding statistics over time ranges
  - name: durations
    description: Heartbeats joined into continuous coding durations
  - name: users
    description: User profile and account information
  - name: projects
    description: Detected coding projects
  - name: status_bar
    description: Today's coding activity for IDE status bars
  - name: all_time
    description: Total coding time since account creation
  - name: goals
    description: Programming goals and targets
  - name: leaderboards
    description: Public and private coding leaderboards
  - name: insights
    description: Coding activity insights and analytics
  - name: custom_rules
    description: Rules for remapping projects, languages, etc.
  - name: machine_names
    description: Machine/device tracking
  - name: user_agents
    description: Editor plugin tracking
  - name: data_dumps
    description: Data export
  - name: external_durations
    description: External time entries (calendar integrations)
  - name: commits
    description: Git commit time tracking
  - name: orgs
    description: Organization and team management
  - name: meta
    description: Server metadata (public)
paths:
  # --- auth ---
  /auth/{provider}:
    $ref: paths/auth/provider.yaml
  /auth/{provider}/callback:
    $ref: paths/auth/provider-callback.yaml
  /auth/link/{provider}:
    $ref: paths/auth/link-provider.yaml
  /auth/link/{provider}/callback:
    $ref: paths/auth/link-provider-callback.yaml
  /auth/link/approve/{pending_link_id}:
    $ref: paths/auth/link-approve.yaml
  /auth/providers:
    $ref: paths/auth/providers.yaml
  /auth/providers/{provider}:
    $ref: paths/auth/providers-provider.yaml
  /auth/session:
    $ref: paths/auth/session.yaml
  /auth/api-key:
    $ref: paths/auth/api-key.yaml

  # --- users ---
  /users/current:
    $ref: paths/users/current.yaml
  /users/current/profile:
    $ref: paths/users/profile.yaml
  /users/current/projects:
    $ref: paths/users/projects.yaml

  # --- heartbeats ---
  /users/current/heartbeats:
    $ref: paths/heartbeats/heartbeats.yaml
  /users/current/heartbeats.bulk:
    $ref: paths/heartbeats/heartbeats-bulk.yaml

  # --- summaries ---
  /users/current/summaries:
    $ref: paths/summaries/summaries.yaml

  # --- stats & durations ---
  /users/current/stats/{range}:
    $ref: paths/stats/stats.yaml
  /users/current/status_bar/today:
    $ref: paths/stats/status-bar.yaml
  /users/current/all_time_since_today:
    $ref: paths/stats/all-time.yaml
  /users/current/durations:
    $ref: paths/stats/durations.yaml

  # --- goals ---
  /users/current/goals:
    $ref: paths/goals/goals.yaml
  /users/current/goals/{goal_id}:
    $ref: paths/goals/goal.yaml

  # --- leaderboards ---
  /leaders:
    $ref: paths/leaderboards/leaders.yaml
  /users/current/leaderboards:
    $ref: paths/leaderboards/leaderboards.yaml
  /users/current/leaderboards/{board_id}:
    $ref: paths/leaderboards/leaderboard.yaml

  # --- insights & custom rules ---
  /users/current/insights/{insight_type}/{range}:
    $ref: paths/insights/insights.yaml
  /users/current/custom_rules:
    $ref: paths/insights/custom-rules.yaml
  /users/current/custom_rules/{rule_id}:
    $ref: paths/insights/custom-rule.yaml

  # --- tracking ---
  /users/current/machine_names:
    $ref: paths/tracking/machine-names.yaml
  /users/current/user_agents:
    $ref: paths/tracking/user-agents.yaml

  # --- external durations ---
  /users/current/external_durations:
    $ref: paths/external-durations/external-durations.yaml
  /users/current/external_durations.bulk:
    $ref: paths/external-durations/external-durations-bulk.yaml

  # --- commits ---
  /users/current/projects/{project}/commits:
    $ref: paths/commits/commits.yaml
  /users/current/projects/{project}/commits/{hash}:
    $ref: paths/commits/commit.yaml

  # --- orgs ---
  /users/current/orgs:
    $ref: paths/orgs/orgs.yaml
  /users/current/orgs/{org_id}/dashboards:
    $ref: paths/orgs/dashboards.yaml
  /users/current/orgs/{org_id}/dashboards/{dashboard_id}/members:
    $ref: paths/orgs/dashboard-members.yaml
  /users/current/orgs/{org_id}/dashboards/{dashboard_id}/summaries:
    $ref: paths/orgs/dashboard-summaries.yaml

  # --- meta ---
  /health:
    $ref: paths/meta/health.yaml
  /editors:
    $ref: paths/meta/editors.yaml
  /program_languages:
    $ref: paths/meta/program-languages.yaml
  /meta:
    $ref: paths/meta/meta.yaml
  /stats/{range}:
    $ref: paths/meta/global-stats.yaml
  /users/current/data_dumps:
    $ref: paths/users/data-dumps.yaml
components:
  securitySchemes:
    apiKey:
      type: http
      scheme: basic
      description: API key as username with empty password (base64 of "apikey:")
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication
    apiKeyQuery:
      type: apiKey
      in: query
      name: api_key
      description: API key as query parameter (?api_key=your_key)
    sessionCookie:
      type: apiKey
      in: cookie
      name: __session
      description: |
        HttpOnly session cookie for web UI.
        Secure, SameSite=Strict, 24h TTL (sliding).
        Random 32-byte token; stored as SHA-256 hash in DB.
