get:
  operationId: getStats
  tags:
    - stats
  summary: Coding statistics for a time range
  parameters:
    - name: range
      in: path
      required: true
      schema:
        type: string
        description: >-
          last_7_days, last_30_days, last_6_months, last_year, all_time, or
          YYYY, YYYY-MM
    - name: timeout
      in: query
      schema:
        type: integer
    - name: writes_only
      in: query
      schema:
        type: boolean
  responses:
    '200':
      description: Statistics
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../../components/schemas/Stats.yaml
    '202':
      description: Stats are still being calculated
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: ../../components/schemas/Stats.yaml
              message:
                type: string
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
