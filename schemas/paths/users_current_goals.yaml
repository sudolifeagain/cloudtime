get:
  operationId: getGoals
  tags:
    - goals
  summary: List user's goals
  responses:
    '200':
      description: List of goals
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/Goal.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
