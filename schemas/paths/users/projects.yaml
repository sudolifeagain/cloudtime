get:
  operationId: getProjects
  tags:
    - projects
  summary: List user's projects
  parameters:
    - name: q
      in: query
      description: Search term
      schema:
        type: string
  responses:
    '200':
      description: List of projects
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../../components/schemas/Project.yaml
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
