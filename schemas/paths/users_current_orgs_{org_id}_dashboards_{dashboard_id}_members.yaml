get:
  operationId: getOrgDashboardMembers
  tags:
    - orgs
  summary: List dashboard members
  parameters:
    - name: org_id
      in: path
      required: true
      schema:
        type: string
    - name: dashboard_id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: List of members
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/OrgMember.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
