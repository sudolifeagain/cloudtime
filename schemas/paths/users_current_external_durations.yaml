get:
  operationId: getExternalDurations
  tags:
    - external_durations
  summary: List external durations for a day
  parameters:
    - name: date
      in: query
      required: true
      schema:
        type: string
        format: date
    - name: project
      in: query
      schema:
        type: string
    - name: branches
      in: query
      schema:
        type: string
    - name: timezone
      in: query
      schema:
        type: string
  responses:
    '200':
      description: List of external durations
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/ExternalDuration.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
post:
  operationId: createExternalDuration
  tags:
    - external_durations
  summary: Create a single external duration
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExternalDurationInput.yaml
  responses:
    '201':
      description: External duration created
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/ExternalDuration.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
