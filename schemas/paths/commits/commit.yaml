get:
  operationId: getProjectCommit
  tags:
    - commits
  summary: Get a single commit with coding time
  parameters:
    - name: project
      in: path
      required: true
      schema:
        type: string
    - name: hash
      in: path
      required: true
      schema:
        type: string
    - name: branch
      in: query
      schema:
        type: string
  responses:
    '200':
      description: Commit data
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../../components/schemas/Commit.yaml
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
    '404':
      $ref: ../../components/responses/NotFound.yaml
