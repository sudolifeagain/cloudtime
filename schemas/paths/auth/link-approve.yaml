post:
  operationId: approvePendingLink
  tags:
    - auth
  summary: Approve merging an OAuth account into existing user
  description: |
    Approves a pending account link created when an OAuth login's verified email
    matched an existing account. The user must be authenticated as the owner of
    the existing account.

    Pending links expire after 1 hour (410 Gone if expired).
    On approval, the OAuth provider is linked to the existing account and the
    pending link record is deleted.
  parameters:
    - name: pending_link_id
      in: path
      required: true
      schema:
        type: string
  responses:
    '200':
      description: Accounts merged
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: object
                required:
                  - user
                properties:
                  user:
                    $ref: ../../components/schemas/User.yaml
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
    '404':
      $ref: ../../components/responses/NotFound.yaml
    '410':
      description: Pending link expired
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
