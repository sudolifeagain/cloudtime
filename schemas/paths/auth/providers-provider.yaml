delete:
  operationId: unlinkProvider
  tags:
    - auth
  summary: Unlink an OAuth provider from current account
  parameters:
    - name: provider
      in: path
      required: true
      schema:
        $ref: ../../components/schemas/OAuthProvider.yaml
  responses:
    '204':
      description: Provider unlinked
    '400':
      description: Cannot unlink last provider
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
