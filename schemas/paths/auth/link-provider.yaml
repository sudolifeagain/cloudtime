post:
  operationId: oauthLinkStart
  tags:
    - auth
  summary: Link additional OAuth provider to current account
  description: |
    Initiates an OAuth flow to link a new provider to the authenticated user's account.
    The user must already be logged in (session cookie required).

    Same PKCE and state security measures as the initial OAuth flow (/auth/{provider}).
    On callback, the provider is linked to the current session's user (identity is
    already established), which is safer than email-based auto-linking.
  parameters:
    - name: provider
      in: path
      required: true
      schema:
        $ref: ../../components/schemas/OAuthProvider.yaml
  responses:
    '302':
      description: Redirect to OAuth provider for linking
      headers:
        Location:
          schema:
            type: string
            format: uri
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
