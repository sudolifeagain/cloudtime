get:
  operationId: getUserAgents
  tags:
    - user_agents
  summary: List editor plugins that have sent data
  responses:
    '200':
      description: List of user agents
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/UserAgent.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
