get:
  operationId: getMachineNames
  tags:
    - machine_names
  summary: List user's machines
  responses:
    '200':
      description: List of machines
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../../components/schemas/Machine.yaml
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
