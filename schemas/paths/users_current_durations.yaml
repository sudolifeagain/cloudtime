get:
  operationId: getDurations
  tags:
    - durations
  summary: Coding durations for a day (heartbeats joined by timeout)
  parameters:
    - name: date
      in: query
      required: true
      schema:
        type: string
        format: date
    - name: project
      in: query
      schema:
        type: string
    - name: branches
      in: query
      schema:
        type: string
    - name: timeout
      in: query
      schema:
        type: integer
    - name: writes_only
      in: query
      schema:
        type: boolean
    - name: timezone
      in: query
      schema:
        type: string
    - name: slice_by
      in: query
      schema:
        type: string
        enum:
          - project
          - entity
          - language
          - dependencies
          - operating_system
          - editor
          - category
          - machine
  responses:
    '200':
      description: List of durations
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/Duration.yaml
              branches:
                type: array
                items:
                  type: string
              start:
                type: string
                format: date
              end:
                type: string
                format: date
              timezone:
                type: string
    '401':
      $ref: ../components/responses/Unauthorized.yaml
