get:
  operationId: getCurrentUser
  tags:
    - users
  summary: Get current user's profile
  responses:
    '200':
      description: User profile
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../components/schemas/User.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
