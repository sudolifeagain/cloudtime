get:
  operationId: getHeartbeats
  tags:
    - heartbeats
  summary: List heartbeats for a given day
  parameters:
    - name: date
      in: query
      required: true
      schema:
        type: string
        format: date
        example: '2026-03-09'
  responses:
    '200':
      description: List of heartbeats
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../../components/schemas/Heartbeat.yaml
              start:
                type: string
                format: date-time
                description: Start of the requested date in the user's timezone (ISO 8601)
              end:
                type: string
                format: date-time
                description: End of the requested date in the user's timezone (ISO 8601)
              timezone:
                type: string
                description: IANA timezone used for date boundary resolution
                example: America/New_York
    '400':
      $ref: ../../components/responses/BadRequest.yaml
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
post:
  operationId: createHeartbeat
  tags:
    - heartbeats
  summary: Create a single heartbeat
  parameters:
    - $ref: ../../components/parameters/UserAgentHeader.yaml
    - $ref: ../../components/parameters/MachineNameHeader.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../../components/schemas/HeartbeatInput.yaml
  responses:
    '201':
      description: Heartbeat created
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../../components/schemas/Heartbeat.yaml
    '400':
      $ref: ../../components/responses/BadRequest.yaml
    '401':
      $ref: ../../components/responses/Unauthorized.yaml
