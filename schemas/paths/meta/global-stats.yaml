get:
  operationId: getGlobalStats
  tags:
    - meta
  summary: Aggregate stats of all users
  security: []
  parameters:
    - name: range
      in: path
      required: true
      schema:
        type: string
        description: >-
          last_7_days, last_30_days, last_6_months, last_year, all_time, or YYYY
          / YYYY-MM
  responses:
    '200':
      description: Aggregate statistics
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../../components/schemas/GlobalStats.yaml
    '202':
      description: Stats are still being calculated
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: ../../components/schemas/GlobalStats.yaml
              message:
                type: string
