get:
  operationId: getGlobalStats
  tags:
    - meta
  summary: Aggregate stats of all users
  security: []
  parameters:
    - name: range
      in: path
      required: true
      schema:
        type: string
        description: >-
          last_7_days, last_30_days, last_6_months, last_year, all_time, or YYYY
          / YYYY-MM
    - name: timezone
      in: query
      description: >-
        IANA timezone (e.g. Asia/Tokyo). Shifts the date anchor used for range
        resolution. Defaults to UTC when omitted. Note: summary data is
        bucketed by each user's profile timezone. In single-user mode, the
        query timezone and bucketing timezone align when the user's profile
        timezone matches. Cross-user timezone aggregation is a known
        limitation for future multi-user support.
      schema:
        type: string
        example: Asia/Tokyo
  responses:
    '200':
      description: Aggregate statistics
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                $ref: ../../components/schemas/GlobalStats.yaml
    '202':
      description: Stats are still being calculated
      content:
        application/json:
          schema:
            type: object
            properties:
              data:
                $ref: ../../components/schemas/GlobalStats.yaml
              message:
                type: string
