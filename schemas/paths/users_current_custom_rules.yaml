get:
  operationId: getCustomRules
  tags:
    - custom_rules
  summary: List user's custom rules
  responses:
    '200':
      description: List of custom rules
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/CustomRule.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
put:
  operationId: updateCustomRules
  tags:
    - custom_rules
  summary: Replace user's custom rules
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: ../components/schemas/CustomRuleInput.yaml
  responses:
    '200':
      description: Updated rules
      content:
        application/json:
          schema:
            type: object
            required:
              - data
            properties:
              data:
                type: array
                items:
                  $ref: ../components/schemas/CustomRule.yaml
    '401':
      $ref: ../components/responses/Unauthorized.yaml
