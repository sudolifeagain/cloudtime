type: object
required:
  - entity
  - type
  - time
properties:
  entity:
    type: string
    description: File path, app name, or domain
  type:
    type: string
    enum:
      - file
      - app
      - domain
      - url
      - event
  time:
    type: number
    format: double
    description: UNIX epoch timestamp
  category:
    $ref: ./Category.yaml
  project:
    type: string
  project_root_count:
    type: integer
  branch:
    type: string
  language:
    type: string
  dependencies:
    description: Dependency names, as comma-separated string or array
    oneOf:
      - type: string
        description: Comma-separated dependency names
      - type: array
        items:
          type: string
        description: Array of dependency names
  lines:
    type: integer
  ai_line_changes:
    type: integer
  human_line_changes:
    type: integer
  lineno:
    type: integer
  cursorpos:
    type: integer
  is_write:
    type: boolean
  editor:
    type: string
  operating_system:
    type: string
  machine:
    type: string
    description: Machine/device name
  user_agent:
    type: string
    description: User agent string from editor plugin
