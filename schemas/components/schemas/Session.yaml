type: object
required:
  - id
  - created_at
  - last_active_at
  - is_current
properties:
  id:
    type: string
  ip:
    type: string
    description: IP address at session creation
  user_agent:
    type: string
    description: User-Agent header at session creation
  created_at:
    type: string
    format: date-time
  last_active_at:
    type: string
    format: date-time
  expires_at:
    type: string
    format: date-time
    description: Absolute expiration (7 days from creation)
  is_current:
    type: boolean
    description: True if this is the session making the request
