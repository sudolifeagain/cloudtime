type: object
required:
  - hash
  - message
  - author_date
properties:
  hash:
    type: string
  message:
    type: string
  author_name:
    type: string
  author_email:
    type: string
    format: email
  author_date:
    type: string
    format: date-time
  committer_name:
    type: string
  committer_email:
    type: string
    format: email
  committer_date:
    type: string
    format: date-time
  total_seconds:
    type: number
    format: double
  human_readable_total:
    type: string
  url:
    type: string
    format: uri
  ref:
    type: string
