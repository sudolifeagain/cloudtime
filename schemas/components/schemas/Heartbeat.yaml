allOf:
  - $ref: ./HeartbeatInput.yaml
  - type: object
    required:
      - id
      - user_id
      - created_at
    properties:
      id:
        type: string
      user_id:
        type: string
      machine:
        type: string
      user_agent_id:
        type: string
      created_at:
        type: string
        format: date-time
      start:
        type: number
        format: double
        description: Session start timestamp (equals heartbeat time)
      end:
        type: number
        format: double
        description: Session end timestamp (next heartbeat time within 15min threshold, or equals start)
      timezone:
        type: string
        description: IANA timezone string
